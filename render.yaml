databases:
  - name: leathercraft-db
    plan: free
    databaseName: leathercraft
    user: leathercraft

services:
  - type: web
    name: leathercraft-store
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: leathercraft-db
          property: connectionString
